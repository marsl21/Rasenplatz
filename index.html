<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rasenplätze FC Rheineck</title>
  <style>
    :root {
      --fcr-blue: #0c3c88;
      --fcr-blue-dark: #082c64;
      --fcr-red: #d71920;
      --fcr-red-dark: #b91218;
      --bg: #eef3f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --green: #1f9d55;
      --green-bg: #eaf8ef;
      --orange: #d97706;
      --orange-bg: #fff3e6;
      --red: #d62828;
      --red-bg: #fdeaea;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, var(--fcr-blue) 0, var(--fcr-blue-dark) 180px, var(--bg) 180px);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 14px 40px;
    }

    .header {
      background: linear-gradient(135deg, var(--fcr-blue) 0%, var(--fcr-red) 100%);
      color: white;
      border-radius: 26px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      overflow: hidden;
      position: relative;
    }

    .header::after {
      content: "";
      position: absolute;
      right: -30px;
      top: -30px;
      width: 140px;
      height: 140px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo-wrap img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      display: block;
    }

    .logo-fallback {
      font-weight: bold;
      font-size: 20px;
      color: white;
    }

    .title-block h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.12;
    }

    .title-block p {
      margin: 6px 0 0;
      font-size: 14px;
      opacity: 0.95;
    }

    .meta-row {
      margin-top: 14px;
      display: grid;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .week-box,
    .updated-box {
      background: rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
    }

   
    .loading,
    .error {
      background: white;
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .error {
      color: var(--red);
      font-weight: bold;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-left: 6px solid #d1d5db;
    }

    .card.freigegeben { border-left-color: var(--green); }
    .card.unsicher { border-left-color: var(--orange); }
    .card.gesperrt { border-left-color: var(--red); }

    .left {
      min-width: 0;
      flex: 1;
    }

    .day {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 7px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
    }

    .badge.freigegeben {
      background: var(--green-bg);
      color: var(--green);
    }

    .badge.unsicher {
      background: var(--orange-bg);
      color: var(--orange);
    }

    .badge.gesperrt {
      background: var(--red-bg);
      color: var(--red);
    }

    .right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .info-btn {
      border: none;
      background: var(--fcr-red);
      color: white;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(215, 25, 32, 0.25);
    }

    .info-btn:hover {
      background: var(--fcr-red-dark);
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 470px;
      background: white;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.24);
      animation: popup 0.18s ease-out;
    }

    @keyframes popup {
      from { transform: translateY(10px) scale(0.98); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .modal-header {
      background: linear-gradient(135deg, var(--fcr-blue) 0%, var(--fcr-red) 100%);
      color: white;
      padding: 16px 18px;
      font-weight: bold;
      font-size: 18px;
    }

    .modal-body {
      padding: 18px;
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .modal-footer {
      padding: 0 18px 18px;
      display: flex;
      justify-content: flex-end;
    }

    .close-btn {
      border: none;
      background: var(--fcr-blue);
      color: white;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    @media (max-width: 560px) {
      .title-block h1 { font-size: 22px; }
      .card { padding: 14px; }
      .day { font-size: 17px; }
      .logo-wrap { width: 58px; height: 58px; }
      .logo-wrap img { width: 46px; height: 46px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-top">
        <div class="logo-wrap">
          <img
            src="logo-fcr.png"
            alt="FC Rheineck Logo"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
          />
          <div class="logo-fallback" style="display:none;">FCR</div>
        </div>
        <div class="title-block">
          <h1>Rasenplätze FC Rheineck</h1>
          <p>Live-Status für Trainer und Teams</p>
        </div>
      </div>

      <div class="meta-row">
        <div class="week-box" id="weekRange">Lade aktuelle Woche...</div>
        <div class="updated-box" id="updatedAt">Zuletzt aktualisiert: wird geladen...</div>
      </div>
    </div>

        <div id="content" class="loading">Daten werden geladen...</div>

      </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header" id="modalTitle">Information</div>
      <div class="modal-body" id="modalText"></div>
      <div class="modal-footer">
        <button class="close-btn" id="closeModal">Schliessen</button>
      </div>
    </div>
  </div>

  <script>
    const orderedDays = [
      "Montag",
      "Dienstag",
      "Mittwoch",
      "Donnerstag",
      "Freitag",
      "Samstag",
      "Sonntag"
    ];

    function getMonday(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function formatSwissDate(date) {
      return date.toLocaleDateString("de-CH", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
    }

    function formatSwissDateTime(date) {
      return date.toLocaleString("de-CH", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function showWeekRange() {
      const monday = getMonday(new Date());
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);

      document.getElementById("weekRange").textContent =
        `Aktuelle Woche: ${formatSwissDate(monday)} bis ${formatSwissDate(sunday)}`;
    }

    function setUpdatedNow() {
      document.getElementById("updatedAt").textContent =
        `Zuletzt aktualisiert: ${formatSwissDateTime(new Date())}`;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeStatus(status) {
      const value = (status || "").trim().toLowerCase();
      if (value === "freigegeben") return "Freigegeben";
      if (value === "unsicher") return "Unsicher";
      if (value === "gesperrt") return "Gesperrt";
      return status || "Unbekannt";
    }

    function statusClass(status) {
      const s = normalizeStatus(status).toLowerCase();
      if (s === "freigegeben") return "freigegeben";
      if (s === "unsicher") return "unsicher";
      if (s === "gesperrt") return "gesperrt";
      return "";
    }

    function parseCSVLine(line, delimiter) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === delimiter && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function parseCSV(text) {
      const clean = text.replace(/\r/g, "").trim();
      if (!clean) return [];

      const lines = clean.split("\n").filter(Boolean);
      const firstLine = lines[0];

      let delimiter = ";";
      if (firstLine.includes("\t")) delimiter = "\t";
      else if (firstLine.includes(";")) delimiter = ";";
      else if (firstLine.includes(",")) delimiter = ",";

      const rows = lines.map(line => parseCSVLine(line, delimiter));
      const headers = rows[0].map(h => h.toLowerCase());

      const tagIndex = headers.indexOf("tag");
      const statusIndex = headers.indexOf("status");
      const infoIndex = headers.indexOf("informationen");

      if (tagIndex === -1 || statusIndex === -1 || infoIndex === -1) {
        throw new Error("CSV-Spalten nicht korrekt. Benötigt: Tag, Status, Informationen");
      }

      return rows.slice(1).map(row => ({
        Tag: row[tagIndex] || "",
        Status: row[statusIndex] || "",
        Informationen: row[infoIndex] || ""
      }));
    }

    function openModal(title, text) {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalText").textContent = text;
      document.getElementById("modalOverlay").classList.add("show");
    }

    function closeModal() {
      document.getElementById("modalOverlay").classList.remove("show");
    }

    function render(data) {
      const content = document.getElementById("content");
      const byDay = {};
    

      data.forEach(item => {
        byDay[item.Tag] = item;
       
      });

      const html = orderedDays.map(day => {
        const entry = byDay[day] || {
          Tag: day,
          Status: "Unbekannt",
          Informationen: ""
        };

        const status = normalizeStatus(entry.Status);
        const cls = statusClass(status);
        const info = (entry.Informationen || "").trim();
        const safeDay = escapeHtml(day);

        return `
          <div class="card ${cls}">
            <div class="left">
              <div class="day">${safeDay}</div>
              <div class="status-row">
                <span class="badge ${cls}">${escapeHtml(status)}</span>
              </div>
            </div>
            <div class="right">
              ${info ? `<button class="info-btn" data-day="${encodeURIComponent(day)}" data-info="${encodeURIComponent(info)}">Info</button>` : ""}
            </div>
          </div>
        `;
      }).join("");

      content.className = "list";
      content.innerHTML = html;

      document.querySelectorAll(".info-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    openModal(
      decodeURIComponent(btn.dataset.day),
      decodeURIComponent(btn.dataset.info)
    );
  });
});

     
    }

    async function loadData() {
      showWeekRange();
      setUpdatedNow();

      try {
        const response = await fetch("platz.csv?ts=" + Date.now(), { cache: "no-store" });

        if (!response.ok) {
          throw new Error("platz.csv konnte nicht geladen werden.");
        }

        const text = await response.text();
        const data = parseCSV(text);
        render(data);
      } catch (error) {
        const content = document.getElementById("content");
        content.className = "error";
        content.textContent = "Fehler beim Laden der Daten: " + error.message;
      }
    }

    document.getElementById("closeModal").addEventListener("click", closeModal);
    document.getElementById("modalOverlay").addEventListener("click", function (e) {
      if (e.target === this) closeModal();
    });

    loadData();
  </script>
</body>
</html>
